name: zebvix
description: Zebvix Cryptocurrency Exchange - World-class trading platform
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # ── Navigation ───────────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Networking ───────────────────────────────────────────────────────────
  dio: ^5.4.1
  pretty_dio_logger: ^1.3.1

  # ── WebSocket ────────────────────────────────────────────────────────────
  web_socket_channel: ^2.4.0

  # ── Storage ──────────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # ── UI ───────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  fl_chart: ^0.66.2
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  percent_indicator: ^4.2.3
  qr_flutter: ^4.1.0
  pin_code_fields: ^8.0.1
  dotted_border: ^2.1.0
  animate_do: ^3.3.4
  card_swiper: ^3.0.1
  badges: ^3.1.2
  infinite_scroll_pagination: ^4.0.0

  # ── Auth & Biometrics ────────────────────────────────────────────────────
  local_auth: ^2.2.0

  # ── Firebase (web: init skipped — no config yet) ─────────────────────────
  firebase_core: ^2.27.0

  # ── Utilities ────────────────────────────────────────────────────────────
  intl: ^0.20.2
  crypto: ^3.0.3
  uuid: ^4.2.2
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  collection: ^1.18.0
  rxdart: ^0.27.7
  logger: ^2.0.2+1
  timeago: ^3.6.0
  encrypt: ^5.0.3
  flutter_markdown: ^0.6.18

  # ── Android-native packages — add back one at a time as screens are built ─
  # These had v1 embedding issues or are unused; uncomment when feature is ready.
  # mobile_scanner: ^3.5.5
  # google_sign_in: ^6.1.6
  # sign_in_with_apple: ^5.0.0
  # firebase_messaging: ^14.7.10
  # flutter_local_notifications: ^16.3.0
  # permission_handler: ^11.1.0
  # image_picker: ^1.0.5
  # file_picker: ^6.1.1
  # url_launcher: ^6.2.2
  # share_plus: ^7.2.1
  # connectivity_plus: ^5.0.2
  # device_info_plus: ^9.1.1
  # package_info_plus: ^5.0.1
  # path_provider: ^2.1.1
  # pull_to_refresh_flutter3: ^2.0.0
  # syncfusion_flutter_charts: ^24.1.41

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # fonts: Inter loaded via google_fonts package at runtime — no local font files needed
