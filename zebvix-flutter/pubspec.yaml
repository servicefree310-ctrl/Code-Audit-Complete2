name: zebvix
description: Zebvix Cryptocurrency Exchange - World-class trading platform
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # ── Navigation ───────────────────────────────────────────────────────────
  go_router: ^17.3.0

  # ── Networking ───────────────────────────────────────────────────────────
  dio: ^5.4.1
  pretty_dio_logger: ^1.3.1

  # ── WebSocket ────────────────────────────────────────────────────────────
  web_socket_channel: ^3.0.3

  # ── Storage ──────────────────────────────────────────────────────────────
  flutter_secure_storage: ^10.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5

  # ── UI — pure Dart/Flutter, no Android plugin ────────────────────────────
  google_fonts: ^8.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^1.2.0
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  percent_indicator: ^4.2.3
  qr_flutter: ^4.1.0
  pin_code_fields: ^9.4.0
  dotted_border: ^3.1.0
  animate_do: ^5.1.0
  card_swiper: ^3.0.1
  syncfusion_flutter_charts: ^33.2.13+1
  badges: ^3.1.2
  infinite_scroll_pagination: ^5.1.1

  # ── Auth & Biometrics ────────────────────────────────────────────────────
  local_auth: ^3.0.1

  # ── Firebase ─────────────────────────────────────────────────────────────
  firebase_core: ^4.11.0

  # ── Utilities — pure Dart, no Android plugin ─────────────────────────────
  intl: ^0.20.2
  crypto: ^3.0.3
  uuid: ^4.2.2
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  collection: ^1.18.0
  rxdart: ^0.28.0
  logger: ^2.0.2+1
  timeago: ^3.6.0
  encrypt: ^5.0.3
  flutter_markdown: ^0.7.7+1

  # ── Android-native packages — add back one at a time as screens are built ─
  # These are commented out because:
  # (a) not yet imported in any Dart file, AND
  # (b) each has an Android plugin that is compiled even when unused —
  #     one of these was causing "Build failed due to use of deleted
  #     Android v1 embedding". Uncomment when the feature is ready.
  #
  # mobile_scanner: ^7.2.0         # QR scan (enable for scanner screens)
  # google_sign_in: ^7.2.0         # Google OAuth
  # sign_in_with_apple: ^7.0.1     # Apple Sign In
  # firebase_messaging: ^16.4.0    # FCM push notifications
  # flutter_local_notifications: ^22.0.1  # Local push notifications
  # permission_handler: ^12.0.3    # Runtime permissions
  # image_picker: ^1.2.2           # Camera / gallery
  # file_picker: ^12.0.0-beta.7    # File upload (BETA — upgrade to stable when available)
  # url_launcher: ^6.2.2           # Open URLs/deep links
  # share_plus: ^13.1.0            # Share sheet
  # connectivity_plus: ^7.1.1      # Network state
  # device_info_plus: ^13.1.0      # Device fingerprint
  # package_info_plus: ^10.1.0     # App version info
  # path_provider: ^2.1.1          # File paths
  # pull_to_refresh_flutter3: ^2.0.2  # Pull-to-refresh

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  retrofit_generator: ^8.2.1
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
